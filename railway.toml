[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'echo \"[vey1] build=$RAILWAY_GIT_COMMIT_SHA\"; restore-onchainos-session.sh; echo \"[vey1] restore done, starting app\"; exec node dist/server.js'"
healthcheckPath = "/ready"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
